name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Run checks
        env:
          CHECK_DIFF_RANGE: ${{ github.event_name == 'pull_request' && format('{0}...HEAD', github.event.pull_request.base.sha) || 'HEAD~1..HEAD' }}
        run: uv run scripts/check

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Blocking gate: pip-audit has zero known CVEs and every bandit medium
    # finding was triaged as a false positive in the 2026-07-03 FIN-2 security
    # review (docs/reviews/2026-07-03-fin2-fin3-closing-review.md) — bandit
    # below fails on high-severity findings only, matching that adjudication.
    continue-on-error: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: pip-audit (dependency CVE scan)
        run: uv tool run pip-audit

      - name: bandit (high-severity static security scan)
        run: uv tool run bandit -r marvis -lll
